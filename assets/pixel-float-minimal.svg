<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <style>
    @keyframes drift1 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes drift2 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(10px); } }
    @keyframes drift3 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    @keyframes drift4 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(7px); } }
    @keyframes drift5 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes drift6 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(9px); } }
    @keyframes drift7 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes drift8 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(6px); } }
    @keyframes drift9 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
    @keyframes drift10 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(11px); } }
    @keyframes drift11 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
    @keyframes drift12 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(8px); } }
    @keyframes drift13 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-11px); } }
    @keyframes drift14 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(5px); } }
    @keyframes pulse { 0%,100% { opacity: 0.03; } 50% { opacity: 0.12; } }
    .d1  { animation: drift1  4s ease-in-out infinite; }
    .d2  { animation: drift2  4.7s ease-in-out infinite; }
    .d3  { animation: drift3  5.2s ease-in-out infinite; }
    .d4  { animation: drift4  3.8s ease-in-out infinite; }
    .d5  { animation: drift5  4.4s ease-in-out infinite; }
    .d6  { animation: drift6  5s ease-in-out infinite; }
    .d7  { animation: drift7  4.2s ease-in-out infinite; }
    .d8  { animation: drift8  3.6s ease-in-out infinite; }
    .d9  { animation: drift9  4.9s ease-in-out infinite; }
    .d10 { animation: drift10 5.5s ease-in-out infinite; }
    .d11 { animation: drift11 4.1s ease-in-out infinite; }
    .d12 { animation: drift12 4.6s ease-in-out infinite; }
    .d13 { animation: drift13 5.3s ease-in-out infinite; }
    .d14 { animation: drift14 3.9s ease-in-out infinite; }
    .glow { animation: pulse 3s ease-in-out infinite; }
    .line { stroke-linecap: round; stroke-linejoin: round; fill: none; }
  </style>

  <!-- background -->
  <rect width="800" height="200" fill="#0c0c14" rx="10"/>

  <!-- subtle grid dots -->
  <g class="glow">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.5" fill="#ffffff"/>
    </pattern>
    <rect width="800" height="200" fill="url(#dots)" rx="10"/>
  </g>

  <!-- PIANO — minimal line art keys -->
  <g transform="translate(30, 75)"><g class="d1">
    <rect x="0" y="0" width="44" height="26" rx="2" stroke="#a78bfa" stroke-width="1.2" fill="none"/>
    <rect x="8" y="0" width="4" height="15" rx="1" fill="#a78bfa" opacity="0.6"/>
    <rect x="17" y="0" width="4" height="15" rx="1" fill="#a78bfa" opacity="0.6"/>
    <rect x="28" y="0" width="4" height="15" rx="1" fill="#a78bfa" opacity="0.6"/>
    <rect x="37" y="0" width="4" height="15" rx="1" fill="#a78bfa" opacity="0.6"/>
  </g></g>

  <!-- MUSIC NOTES -->
  <g transform="translate(105, 55)"><g class="d2">
    <circle cx="0" cy="16" r="3.5" stroke="#f472b6" stroke-width="1.2" fill="none"/>
    <line x1="3.5" y1="16" x2="3.5" y2="0" stroke="#f472b6" stroke-width="1.2" class="line"/>
    <circle cx="18" cy="12" r="3.5" stroke="#f472b6" stroke-width="1.2" fill="none"/>
    <line x1="21.5" y1="12" x2="21.5" y2="-2" stroke="#f472b6" stroke-width="1.2" class="line"/>
    <line x1="3.5" y1="0" x2="21.5" y2="-2" stroke="#f472b6" stroke-width="1.2" class="line"/>
  </g></g>

  <!-- BORDER COLLIE — minimal face -->
  <g transform="translate(170, 70)"><g class="d3">
    <ellipse cx="18" cy="14" rx="15" ry="12" stroke="#e2e8f0" stroke-width="1.2" fill="none"/>
    <!-- ears -->
    <path d="M5,5 Q1,-5 8,2" stroke="#e2e8f0" stroke-width="1.2" class="line"/>
    <path d="M31,5 Q35,-5 28,2" stroke="#e2e8f0" stroke-width="1.2" class="line"/>
    <!-- eyes -->
    <circle cx="12" cy="12" r="1.5" fill="#e2e8f0"/>
    <circle cx="24" cy="12" r="1.5" fill="#e2e8f0"/>
    <!-- nose -->
    <ellipse cx="18" cy="18" rx="2.5" ry="1.5" fill="#e2e8f0"/>
  </g></g>

  <!-- CAMERA -->
  <g transform="translate(250, 90)"><g class="d4">
    <rect x="0" y="5" width="32" height="20" rx="3" stroke="#6366f1" stroke-width="1.2" fill="none"/>
    <rect x="10" y="0" width="12" height="7" rx="2" stroke="#6366f1" stroke-width="1.2" fill="none"/>
    <circle cx="16" cy="15" r="6" stroke="#6366f1" stroke-width="1.2" fill="none"/>
    <circle cx="16" cy="15" r="2.5" fill="#6366f1" opacity="0.4"/>
  </g></g>

  <!-- COCKTAIL -->
  <g transform="translate(325, 60)"><g class="d5">
    <line x1="8" y1="8" x2="28" y2="8" stroke="#c084fc" stroke-width="1.2" class="line"/>
    <line x1="10" y1="8" x2="15" y2="28" stroke="#c084fc" stroke-width="1.2" class="line"/>
    <line x1="26" y1="8" x2="21" y2="28" stroke="#c084fc" stroke-width="1.2" class="line"/>
    <line x1="18" y1="28" x2="18" y2="36" stroke="#c084fc" stroke-width="1.2" class="line"/>
    <line x1="12" y1="36" x2="24" y2="36" stroke="#c084fc" stroke-width="1.2" class="line"/>
    <circle cx="28" cy="4" r="2.5" stroke="#4ade80" stroke-width="1.2" fill="none"/>
  </g></g>

  <!-- BUBBLE TEA -->
  <g transform="translate(400, 80)"><g class="d6">
    <rect x="4" y="4" width="22" height="34" rx="3" stroke="#f9a8d4" stroke-width="1.2" fill="none"/>
    <line x1="4" y1="8" x2="26" y2="8" stroke="#f9a8d4" stroke-width="1.2" class="line"/>
    <rect x="17" y="-6" width="2" height="14" rx="1" fill="#f9a8d4" opacity="0.5"/>
    <circle cx="10" cy="28" r="2.5" fill="#f9a8d4" opacity="0.3"/>
    <circle cx="17" cy="31" r="2.5" fill="#f9a8d4" opacity="0.3"/>
    <circle cx="21" cy="26" r="2.5" fill="#f9a8d4" opacity="0.3"/>
    <circle cx="13" cy="34" r="2" fill="#f9a8d4" opacity="0.3"/>
  </g></g>

  <!-- GAME CONTROLLER -->
  <g transform="translate(470, 65)"><g class="d7">
    <rect x="0" y="4" width="40" height="22" rx="8" stroke="#38bdf8" stroke-width="1.2" fill="none"/>
    <!-- d-pad -->
    <line x1="10" y1="10" x2="10" y2="20" stroke="#38bdf8" stroke-width="1.2" class="line"/>
    <line x1="5" y1="15" x2="15" y2="15" stroke="#38bdf8" stroke-width="1.2" class="line"/>
    <!-- buttons -->
    <circle cx="30" cy="11" r="2" stroke="#38bdf8" stroke-width="1" fill="none"/>
    <circle cx="35" cy="15" r="2" stroke="#38bdf8" stroke-width="1" fill="none"/>
    <circle cx="25" cy="15" r="2" stroke="#38bdf8" stroke-width="1" fill="none"/>
    <circle cx="30" cy="19" r="2" stroke="#38bdf8" stroke-width="1" fill="none"/>
  </g></g>

  <!-- ART PALETTE -->
  <g transform="translate(550, 85)"><g class="d8">
    <ellipse cx="18" cy="14" rx="18" ry="13" stroke="#fbbf24" stroke-width="1.2" fill="none"/>
    <circle cx="10" cy="18" r="3" stroke="#fbbf24" stroke-width="1" fill="none"/>
    <circle cx="10" cy="8" r="2" fill="#ef4444" opacity="0.5"/>
    <circle cx="18" cy="5" r="2" fill="#3b82f6" opacity="0.5"/>
    <circle cx="26" cy="8" r="2" fill="#4ade80" opacity="0.5"/>
    <circle cx="28" cy="16" r="1.5" fill="#c084fc" opacity="0.5"/>
  </g></g>

  <!-- BOOK -->
  <g transform="translate(625, 60)"><g class="d9">
    <rect x="0" y="0" width="28" height="36" rx="2" stroke="#818cf8" stroke-width="1.2" fill="none"/>
    <line x1="5" y1="0" x2="5" y2="36" stroke="#818cf8" stroke-width="1.2" class="line"/>
    <line x1="9" y1="10" x2="23" y2="10" stroke="#818cf8" stroke-width="0.8" class="line" opacity="0.4"/>
    <line x1="9" y1="15" x2="20" y2="15" stroke="#818cf8" stroke-width="0.8" class="line" opacity="0.4"/>
    <line x1="9" y1="20" x2="22" y2="20" stroke="#818cf8" stroke-width="0.8" class="line" opacity="0.4"/>
    <line x1="9" y1="25" x2="18" y2="25" stroke="#818cf8" stroke-width="0.8" class="line" opacity="0.4"/>
  </g></g>

  <!-- COFFEE -->
  <g transform="translate(695, 80)"><g class="d10">
    <rect x="2" y="6" width="20" height="18" rx="2" stroke="#d4a574" stroke-width="1.2" fill="none"/>
    <path d="M22,10 Q30,10 30,15 Q30,20 22,20" stroke="#d4a574" stroke-width="1.2" class="line"/>
    <path d="M8,6 Q9,0 12,6" stroke="#d4a574" stroke-width="1" class="line" opacity="0.4"/>
    <path d="M14,6 Q15,1 18,6" stroke="#d4a574" stroke-width="1" class="line" opacity="0.4"/>
  </g></g>

  <!-- AIRPLANE -->
  <g transform="translate(50, 140)"><g class="d11">
    <ellipse cx="22" cy="10" rx="18" ry="4" stroke="#94a3b8" stroke-width="1.2" fill="none"/>
    <polygon points="16,6 24,6 20,0" stroke="#94a3b8" stroke-width="1" fill="none"/>
    <polygon points="16,14 24,14 20,20" stroke="#94a3b8" stroke-width="1" fill="none"/>
    <polygon points="5,7 5,3 9,7" stroke="#f472b6" stroke-width="1" fill="#f472b6" opacity="0.4"/>
  </g></g>

  <!-- CUPCAKE -->
  <g transform="translate(320, 140)"><g class="d12">
    <path d="M5,12 Q8,4 13,9 Q17,2 21,7 Q25,2 28,9 Q32,4 32,12" stroke="#f9a8d4" stroke-width="1.2" class="line"/>
    <rect x="7" y="12" width="22" height="16" rx="1" stroke="#fbbf24" stroke-width="1.2" fill="none"/>
    <circle cx="18" cy="4" r="3" stroke="#ef4444" stroke-width="1.2" fill="none"/>
  </g></g>

  <!-- BASQUE CHEESECAKE -->
  <g transform="translate(520, 140)"><g class="d13">
    <ellipse cx="20" cy="8" rx="18" ry="6" stroke="#92400e" stroke-width="1.2" fill="none"/>
    <line x1="2" y1="8" x2="2" y2="22" stroke="#fbbf24" stroke-width="1.2" class="line"/>
    <line x1="38" y1="8" x2="38" y2="22" stroke="#fbbf24" stroke-width="1.2" class="line"/>
    <ellipse cx="20" cy="22" rx="18" ry="6" stroke="#fbbf24" stroke-width="1.2" fill="none"/>
    <ellipse cx="20" cy="8" rx="10" ry="3" fill="#78350f" opacity="0.3"/>
  </g></g>

  <!-- OPEN BOOK -->
  <g transform="translate(720, 140)"><g class="d14">
    <path d="M18,4 Q18,0 2,3 L0,30 Q18,27 18,30" stroke="#a78bfa" stroke-width="1.2" class="line"/>
    <path d="M18,4 Q18,0 34,3 L36,30 Q18,27 18,30" stroke="#a78bfa" stroke-width="1.2" class="line"/>
    <line x1="5" y1="10" x2="15" y2="9" stroke="#a78bfa" stroke-width="0.7" class="line" opacity="0.3"/>
    <line x1="5" y1="15" x2="14" y2="14" stroke="#a78bfa" stroke-width="0.7" class="line" opacity="0.3"/>
    <line x1="21" y1="9" x2="31" y2="10" stroke="#a78bfa" stroke-width="0.7" class="line" opacity="0.3"/>
    <line x1="21" y1="14" x2="30" y2="15" stroke="#a78bfa" stroke-width="0.7" class="line" opacity="0.3"/>
  </g></g>
</svg>
