<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="800" height="250">
  <style>
    @keyframes a1 {
      0%   { transform: translate(0,0) rotate(0deg); }
      33%  { transform: translate(30px,-20px) rotate(4deg); }
      66%  { transform: translate(-20px,15px) rotate(-3deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    @keyframes a2 {
      0%   { transform: translate(0,0) rotate(0deg); }
      33%  { transform: translate(-25px,20px) rotate(-5deg); }
      66%  { transform: translate(20px,-15px) rotate(3deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    @keyframes a3 {
      0%   { transform: translate(0,0) rotate(0deg); }
      25%  { transform: translate(20px,25px) rotate(5deg); }
      50%  { transform: translate(-15px,10px) rotate(-2deg); }
      75%  { transform: translate(10px,-20px) rotate(3deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    @keyframes a4 {
      0%   { transform: translate(0,0) rotate(0deg); }
      25%  { transform: translate(-20px,-15px) rotate(-4deg); }
      50%  { transform: translate(25px,10px) rotate(2deg); }
      75%  { transform: translate(-10px,20px) rotate(-3deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    @keyframes a5 {
      0%   { transform: translate(0,0) rotate(0deg); }
      33%  { transform: translate(15px,-25px) rotate(3deg); }
      66%  { transform: translate(-25px,10px) rotate(-4deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    @keyframes a6 {
      0%   { transform: translate(0,0) rotate(0deg); }
      25%  { transform: translate(-15px,20px) rotate(-3deg); }
      50%  { transform: translate(20px,-10px) rotate(4deg); }
      75%  { transform: translate(-20px,-15px) rotate(-2deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    @keyframes a7 {
      0%   { transform: translate(0,0) rotate(0deg); }
      33%  { transform: translate(25px,15px) rotate(5deg); }
      66%  { transform: translate(-15px,-20px) rotate(-3deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    @keyframes a8 {
      0%   { transform: translate(0,0) rotate(0deg); }
      25%  { transform: translate(-20px,10px) rotate(-4deg); }
      50%  { transform: translate(15px,20px) rotate(2deg); }
      75%  { transform: translate(20px,-15px) rotate(5deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    @keyframes a9 {
      0%   { transform: translate(0,0) rotate(0deg); }
      33%  { transform: translate(20px,-15px) rotate(3deg); }
      66%  { transform: translate(-20px,20px) rotate(-5deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    @keyframes a10 {
      0%   { transform: translate(0,0) rotate(0deg); }
      25%  { transform: translate(-25px,-10px) rotate(-3deg); }
      50%  { transform: translate(10px,25px) rotate(4deg); }
      75%  { transform: translate(25px,-5px) rotate(-2deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    @keyframes a11 {
      0%   { transform: translate(0,0) rotate(0deg); }
      33%  { transform: translate(15px,20px) rotate(4deg); }
      66%  { transform: translate(-20px,-10px) rotate(-3deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    @keyframes a12 {
      0%   { transform: translate(0,0) rotate(0deg); }
      25%  { transform: translate(-15px,15px) rotate(-5deg); }
      50%  { transform: translate(20px,-20px) rotate(3deg); }
      75%  { transform: translate(-10px,10px) rotate(-2deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    @keyframes a13 {
      0%   { transform: translate(0,0) rotate(0deg); }
      33%  { transform: translate(20px,10px) rotate(3deg); }
      66%  { transform: translate(-15px,-20px) rotate(-4deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    @keyframes a14 {
      0%   { transform: translate(0,0) rotate(0deg); }
      25%  { transform: translate(-20px,-20px) rotate(-3deg); }
      50%  { transform: translate(15px,15px) rotate(5deg); }
      75%  { transform: translate(20px,-10px) rotate(-2deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    @keyframes sparkle {
      0%, 100% { opacity: 0.15; }
      50%      { opacity: 0.9; }
    }
    .f1  { animation: a1  7s ease-in-out infinite; }
    .f2  { animation: a2  8.5s ease-in-out infinite; }
    .f3  { animation: a3  9s ease-in-out infinite; }
    .f4  { animation: a4  7.5s ease-in-out infinite; }
    .f5  { animation: a5  10s ease-in-out infinite; }
    .f6  { animation: a6  8s ease-in-out infinite; }
    .f7  { animation: a7  9.5s ease-in-out infinite; }
    .f8  { animation: a8  7s ease-in-out infinite; }
    .f9  { animation: a9  11s ease-in-out infinite; }
    .f10 { animation: a10 8s ease-in-out infinite; }
    .f11 { animation: a11 9s ease-in-out infinite; }
    .f12 { animation: a12 7.5s ease-in-out infinite; }
    .f13 { animation: a13 10s ease-in-out infinite; }
    .f14 { animation: a14 8.5s ease-in-out infinite; }
    .s1 { animation: sparkle 2s ease-in-out infinite; }
    .s2 { animation: sparkle 2.5s ease-in-out 0.4s infinite; }
    .s3 { animation: sparkle 1.8s ease-in-out 0.9s infinite; }
    .s4 { animation: sparkle 2.2s ease-in-out 1.3s infinite; }
    .s5 { animation: sparkle 3s ease-in-out 0.6s infinite; }
    .s6 { animation: sparkle 2.1s ease-in-out 1.6s infinite; }
  </style>

